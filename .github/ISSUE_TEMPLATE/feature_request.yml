name: Feature Request
description: Suggest an improvement or new feature
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: "Describe the feature you'd like to see."

  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: What problem does this solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should it work?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Parser / Ingestor
        - Risk Engine
        - Filters
        - DMV Workflow
        - UI / Design
        - CI/CD
        - Documentation
        - Other
    validations:
      required: true
